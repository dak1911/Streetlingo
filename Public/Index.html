<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreetLingo AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
}

.app {
  width:100%;
  max-width:520px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header {
  padding:14px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid #1f2a44;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg {
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.user { background:#2563eb; align-self:flex-end; }
.ai { background:#1f2937; align-self:flex-start; }

.controls {
  display:flex;
  padding:10px;
  gap:6px;
  border-top:1px solid #1f2a44;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111827;
  color:white;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>
<div class="app">

<header>🗣️ StreetLingo AI Tutor</header>

<div id="chat"></div>

<div class="controls">
<input id="input" placeholder="Type or speak...">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
<button onclick="upgrade()">Pro</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
